<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#001E2B"/>
      <stop offset="100%" stop-color="#023047"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00ED64"/>
      <stop offset="100%" stop-color="#00A35C"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#001E2B"/>
      <stop offset="100%" stop-color="#012E1F"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00ED64" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="520" height="160" rx="18" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#00ED6415" stroke-width="0.8">
    <line x1="0" y1="40"  x2="520" y2="40"/>
    <line x1="0" y1="80"  x2="520" y2="80"/>
    <line x1="0" y1="120" x2="520" y2="120"/>
    <line x1="130" y1="0" x2="130" y2="160"/>
    <line x1="260" y1="0" x2="260" y2="160"/>
    <line x1="390" y1="0" x2="390" y2="160"/>
  </g>

  <!-- Hexagon icon -->
  <g transform="translate(80,80)" filter="url(#shadow)">
    <!-- Outer hex -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26"
             fill="url(#hexGrad)" opacity="0.15" stroke="#00ED64" stroke-width="1.5"/>
    <!-- Inner hex -->
    <polygon points="0,-38 33,-19 33,19 0,38 -33,19 -33,-19"
             fill="url(#hexGrad)" opacity="0.08"/>

    <!-- V shape (VaultIQ mark) -->
    <polyline points="-20,-18 0,22 20,-18"
              fill="none" stroke="#00ED64" stroke-width="5.5"
              stroke-linecap="round" stroke-linejoin="round"
              filter="url(#glow)"/>

    <!-- Node dots on hex vertices -->
    <circle cx="0"   cy="-52" r="3.5" fill="#00ED64" opacity="0.9"/>
    <circle cx="45"  cy="-26" r="3.5" fill="#00ED64" opacity="0.9"/>
    <circle cx="45"  cy="26"  r="3.5" fill="#00ED64" opacity="0.9"/>
    <circle cx="0"   cy="52"  r="3.5" fill="#00ED64" opacity="0.9"/>
    <circle cx="-45" cy="26"  r="3.5" fill="#00ED64" opacity="0.9"/>
    <circle cx="-45" cy="-26" r="3.5" fill="#00ED64" opacity="0.9"/>

    <!-- Connecting lines between nodes (data network) -->
    <g stroke="#00ED6440" stroke-width="1">
      <line x1="0" y1="-52" x2="45"  y2="26"/>
      <line x1="45" y1="-26" x2="-45" y2="26"/>
      <line x1="-45" y1="-26" x2="45" y2="26"/>
    </g>
  </g>

  <!-- VaultIQ wordmark -->
  <text x="152" y="75"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1"
        fill="#FFFFFF">Vault</text>
  <text x="283" y="75"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="48" font-weight="800" letter-spacing="-1"
        fill="#00ED64" filter="url(#glow)">IQ</text>

  <!-- Tagline -->
  <text x="153" y="100"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13.5" font-weight="400" letter-spacing="0.5"
        fill="#C8D8E8" opacity="0.85">NextGen AI Financial Intelligence Suite</text>

  <!-- Divider line -->
  <line x1="153" y1="112" x2="490" y2="112" stroke="#00ED6430" stroke-width="1"/>

  <!-- Powered by line -->
  <text x="153" y="130"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="300" letter-spacing="1.2"
        fill="#00ED64" opacity="0.7">POWERED BY  MONGODB ATLAS  ·  LANGCHAIN  ·  AZURE OPENAI</text>

  <!-- Top-right accent dots -->
  <circle cx="492" cy="22" r="3" fill="#00ED64" opacity="0.5"/>
  <circle cx="504" cy="22" r="3" fill="#00ED64" opacity="0.3"/>
  <circle cx="498" cy="12" r="3" fill="#00ED64" opacity="0.2"/>
</svg>
